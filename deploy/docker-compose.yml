services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/licenseguard-migrate"]
    command:
      - "-database-url=${DATABASE_URL}"
      - "-migrations-dir=/app/migrations"
    restart: "no"

  licenseguard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    command:
      - "-addr=0.0.0.0:8090"
      - "-store=postgres"
      - "-database-url=${DATABASE_URL}"
      - "-key-dir=/var/lib/licenseguard/keys"
      - "-admin-dir=/app/web/admin"
      - "-migrations-dir=/app/migrations"
      - "-cors-allowed-origins=${LG_CORS_ALLOWED_ORIGINS}"
    ports:
      - "${LICENSEGUARD_HTTP_PORT}:8090"
    volumes:
      - licenseguard_keys:/var/lib/licenseguard/keys
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  licenseguard_keys:
