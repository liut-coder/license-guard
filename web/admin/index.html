        state.sdkContext = { app, appID, sdkKey, keys: appDetail.sdk_keys || [], releases, onboarding, params, capabilityPolicies };
        setSDKTab(state.sdkTab);
        renderSDKKeyPanel(appID, sdkKey, appDetail.sdk_keys || []);
        renderSDKOverview(state.sdkContext);
        renderSDKGuide(state.sdkContext);
        renderSDKPolicy(state.sdkContext);
        renderSDKGenerate(state.sdkContext);
        renderSDKVerify(state.sdkContext);
      }

      async function loadPublicKey() {
        try {
          const key = await api("/v1/public-key");
          return key.public_key || "";
        } catch (error) {
          return `加载失败: ${error.message}`;
        }
      }

      function deriveOnboarding(appDetail, appID) {
        const releases = appDetail.releases || [];
        const licenses = appDetail.licenses || [];
        const keys = appDetail.sdk_keys || [];
        const latest = latestRelease(releases);
        const activeKey = activeSDKKey(keys);
        const steps = [
          ["app_created", "创建 App", Boolean(appDetail.app)],
          ["release_created", "发布版本", releases.length > 0],
          ["license_issued", "签发 License", licenses.length > 0],
          ["sdk_key_active", "配置 SDK Key", Boolean(activeKey && activeKey.status === "active")],
          ["app_config", "改造 App 配置", null],
          ["first_activation", "接入首次激活", false],
          ["local_verify", "接入本地验签", null],
          ["online_verify", "接入在线 verify", false],
          ["heartbeat", "接入 heartbeat", false],
          ["entitlements", "接入 entitlements", null],
          ["integrity_report", "接入完整性上报", false],
          ["risk_drill", "演练错误场景", false],
        ].map(([id, label, ok]) => ({ id, label, status: ok === null ? "manual" : ok ? "passed" : "current", source: ok === null ? "client" : "client-fallback" }));
        return {
          app_id: appID,
          app: appDetail.app || {},
          has_active_sdk_key: Boolean(activeKey),
          has_release: releases.length > 0,
          has_license: licenses.length > 0,
          latest_release: latest || null,
          offline_grace_days: state.settings?.offline_grace_days || 7,
          steps,
        };
      }

      function renderSDKOverview(ctx) {
        if (!ctx) return;
        const onboarding = withManualStepState(ctx.onboarding, ctx.appID);
        const latest = onboarding.latest_release || {};
        const next = onboarding.steps.find((step) => step.status !== "passed");
        document.getElementById("sdkPanelOverview").innerHTML = `
          <div class="sdk-board">
            <div>
              <div class="callout">
                <div class="strong">${escapeHTML(ctx.app?.name || "当前应用")} / ${escapeHTML(ctx.appID)}</div>
                <div class="muted-line">Endpoint: ${escapeHTML(ctx.params.endpoint)}</div>
                <div class="muted-line">SDK Key: ${escapeHTML(ctx.sdkKey?.status || "missing")} / ${escapeHTML(ctx.sdkKey?.key_prefix || "未生成")} · Public Key: ${ctx.params.public_key ? "已加载" : "未加载"}</div>
                <div class="muted-line">Release: ${escapeHTML(latest.version || "未发布")} · Hash: ${escapeHTML(latest.main_binary_hash || "未配置")}</div>
              </div>
              <div class="sdk-progress">${onboarding.steps.map(renderSDKStep).join("")}</div>
            </div>
            <div class="sdk-evidence">
              <h3>最近验证证据</h3>
              ${evidenceRows(onboarding)}
              <div class="callout"><div class="strong">下一步建议</div>${escapeHTML(next ? next.label : "接入闭环已完成，保持心跳和风险演练定期验证。")}</div>
            </div>
          </div>`;
      }

      function renderSDKStep(step) {
        const symbol = step.status === "passed" ? "✓" : step.status === "blocked" ? "!" : step.status === "manual" ? "·" : "●";
        const manual = step.source === "client" ? `<div class="sdk-actions">${actionButton(step.status === "passed" ? "取消标记" : "标记为已接入", "sdk-manual-step", step.id)}</div>` : "";
        return `<div class="sdk-progress-item">
          <div class="sdk-progress-head"><span class="strong">${escapeHTML(step.label)}</span><span class="sdk-status-dot sdk-status-${escapeHTML(step.status)}">${symbol}</span></div>
          <div class="muted-line">${escapeHTML(step.source)} · ${escapeHTML(step.status)}</div>
          ${manual}
        </div>`;
      }

      function evidenceRows(onboarding) {
        const rows = [
          ["最新设备", onboarding.latest_device ? `${onboarding.latest_device.id} · ${formatDateTime(onboarding.latest_device.last_seen_at)}` : "暂无"],
          ["完整性上报", onboarding.latest_integrity_report ? `${onboarding.latest_integrity_report.app_version} · ${formatDateTime(onboarding.latest_integrity_report.created_at)}` : "暂无"],
          ["风险事件", onboarding.latest_risk_event ? `${onboarding.latest_risk_event.event_type} · ${onboarding.latest_risk_event.severity}` : "暂无"],
          ["离线宽限", `${onboarding.offline_grace_days ?? state.settings?.offline_grace_days ?? 7} 天`],
        ];
        return rows.map(([label, value]) => `<p><span class="strong">${escapeHTML(label)}:</span> ${escapeHTML(value)}</p>`).join("");
      }

      function renderSDKGuide(ctx) {
        const cards = [
          ["App 启动流程", "main.go", "初始化配置、本地 token 验签、后台 verify、heartbeat 定时器。", "断网时基础功能可启动，联网后授权状态自动刷新。"],
          ["授权模块", "internal/licenseguard/", "隔离 API 调用、设备指纹、完整性采集、缓存和 Ed25519 验签。", "业务层只依赖 Service 或等价接口。"],
          ["业务功能层", "export/batch/pro features", "高价值功能统一调用 HasEntitlement(\"export.enabled\")。", "移除 entitlement 后对应功能不可用。"],
          ["用户提示层", "ui/license_errors.go", "错误码映射为可理解提示，并给出重试、联网、联系管理员等动作。", "测试人员可通过错误码定位授权、设备、版本或完整性问题。"],
        ];
        document.getElementById("sdkPanelGuide").innerHTML = `<div class="sdk-guide-grid">${cards
          .map(
            ([title, path, todo, success], index) => `<div class="sdk-guide-card">
              <h3>步骤 ${index + 1}: ${escapeHTML(title)}</h3>
              <p><span class="strong">放在哪里:</span> ${escapeHTML(path)}</p>
              <p><span class="strong">App 要改什么:</span> ${escapeHTML(todo)}</p>
              <p><span class="strong">成功标准:</span> ${escapeHTML(success)}</p>
            </div>`,
          )
          .join("")}</div>`;
      }

      function renderSDKPolicy(ctx) {
        if (!ctx) return;
        document.getElementById("sdkPanelPolicy").innerHTML = `
          <div class="sdk-board">
            <div>
              <div class="action-group">
                ${actionButton("补齐默认策略", "seed-policy-defaults", ctx.appID)}
                ${actionButton("新增策略", "add-policy-row", ctx.appID)}
                ${actionButton("保存策略", "save-policies", ctx.appID)}
              </div>
              <div class="table-wrap" style="margin-top: 14px">
                <table>
                  <thead>
                    <tr>
                      <th>Capability</th>
                      <th>Entitlement</th>
                      <th>模式</th>
                      <th>提示</th>
                      <th>Limits JSON</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="policyEditorRows">${(ctx.capabilityPolicies || []).map(policyRowHTML).join("")}</tbody>
                </table>
              </div>
            </div>
            <div class="sdk-evidence">
              <h3>策略边界</h3>
              <p><span class="strong">当前 App:</span> ${escapeHTML(ctx.appID)}</p>
              <p><span class="strong">策略数:</span> ${escapeHTML((ctx.capabilityPolicies || []).length)}</p>
              <p><span class="strong">规则:</span> License entitlement 仍是硬边界，策略只能收紧或改变体验。</p>
              <p><span class="strong">默认:</span> 未知 capability 按 block 处理。</p>
            </div>
          </div>`;
      }

      function policyRowHTML(policy = {}) {
        const limits = policy.limits_json && Object.keys(policy.limits_json).length ? JSON.stringify(policy.limits_json, null, 2) : "{}";
        return `<tr data-policy-row>
          <td><input data-policy-field="capability" value="${escapeHTML(policy.capability || "")}" /></td>
          <td><input data-policy-field="required_entitlement" value="${escapeHTML(policy.required_entitlement || "")}" /></td>
          <td><select data-policy-field="mode">${policyModeOptions(policy.mode || "block")}</select></td>
          <td><input data-policy-field="message" value="${escapeHTML(policy.message || "")}" /></td>
          <td><textarea data-policy-field="limits_json">${escapeHTML(limits)}</textarea></td>
          <td>${actionButton("删除", "remove-policy-row", policy.capability || "new")}</td>
        </tr>`;
      }

      function policyModeOptions(selected) {
        return ["block", "allow", "hide", "readonly", "degrade", "watermark", "warn"]
          .map((mode) => `<option value="${mode}"${mode === selected ? " selected" : ""}>${mode}</option>`)
          .join("");
      }

      function addCapabilityPolicyRow() {
        const rows = document.getElementById("policyEditorRows");
        if (!rows) return;
        rows.insertAdjacentHTML("beforeend", policyRowHTML({ mode: "block", limits_json: {} }));
      }

      function collectCapabilityPolicyRows() {
        return [...document.querySelectorAll("[data-policy-row]")]
          .map((row) => {
            const field = (name) => row.querySelector(`[data-policy-field="${name}"]`);
            const capability = field("capability")?.value.trim() || "";
            const requiredEntitlement = field("required_entitlement")?.value.trim() || "";
            const mode = field("mode")?.value || "block";
            const message = field("message")?.value.trim() || "";
            const limitsText = field("limits_json")?.value.trim() || "{}";
            return {
              capability,
              required_entitlement: requiredEntitlement,
              mode,
              message,
              limits_json: JSON.parse(limitsText),
            };
          })
          .filter((item) => item.capability || item.required_entitlement || item.message);
      }

      async function saveCapabilityPolicies(appID) {
        try {
          const items = collectCapabilityPolicyRows();
          const data = await api(`/admin/apps/${encodeURIComponent(appID)}/capability-policies`, {
            method: "PUT",
            body: JSON.stringify({ items }),
          });
          state.sdkContext.capabilityPolicies = data.items || [];
          renderSDKPolicy(state.sdkContext);
          refreshIcons();
          document.getElementById("copyState").textContent = "能力策略已保存";
        } catch (error) {
          document.getElementById("copyState").textContent = `能力策略保存失败: ${error.message}`;
        }
      }

      function renderSDKGenerate(ctx) {
        document.getElementById("sdkPanelGenerate").innerHTML = `
          <div class="sdk-board">
            <div class="sdk-param-panel">
              <h3>参数面板</h3>
              <div class="sdk-param-grid">${sdkParamInputs(ctx.params)}</div>
            </div>
            <div>
              <div class="snippet-tabs">${snippetButtons().join("")}</div>
              <div class="code-box">
                <div class="code-head">
                  <span id="generatedSnippetTitle">自动生成</span>
                  <button class="button secondary" data-copy-target="generatedSnippet"><i class="icon" data-lucide="copy"></i><span>复制</span></button>
                </div>
                <pre id="generatedSnippet"></pre>
              </div>
            </div>
          </div>`;
        renderGeneratedOutputs();
      }

      function sdkParamInputs(params) {
        const labels = {
          endpoint: "Endpoint",
          app_id: "App ID",
          license_key: "License Key",
          app_version: "App Version",
          binary_hash: "Binary Hash",
          signer_thumbprint: "Signer Thumbprint",
          install_id_path: "Install ID Path",
          token_cache_path: "Token Cache Path",
        };
        return Object.entries(labels)
          .map(([key, label]) => `<div class="field"><label>${escapeHTML(label)}</label><input data-sdk-param="${escapeHTML(key)}" value="${escapeHTML(params[key] || "")}" /></div>`)
          .join("");
      }

      function snippetButtons() {
        return Object.entries(snippets()).map(([key, item]) => `<button type="button" class="${state.sdkSnippet === key ? "active" : ""}" data-sdk-snippet="${escapeHTML(key)}">${escapeHTML(item.label)}</button>`);
      }

      function renderGeneratedOutputs() {
        if (!state.sdkContext || !document.getElementById("generatedSnippet")) return;
        const items = snippets();
        if (!items[state.sdkSnippet]) state.sdkSnippet = "env";
        document.querySelectorAll("[data-sdk-snippet]").forEach((node) => node.classList.toggle("active", node.dataset.sdkSnippet === state.sdkSnippet));
        document.getElementById("generatedSnippetTitle").textContent = items[state.sdkSnippet].label;
        document.getElementById("generatedSnippet").textContent = items[state.sdkSnippet].build(state.sdkContext.params);
      }

      function snippets() {
        return {
          env: { label: ".env", build: (p) => `LICENSE_GUARD_ENDPOINT=${p.endpoint}\nLICENSE_GUARD_APP_ID=${p.app_id}\nLICENSE_GUARD_APP_VERSION=${p.app_version}\nLICENSE_GUARD_PUBLIC_KEY=${p.public_key}\nLICENSE_GUARD_BINARY_HASH=${p.binary_hash}\nLICENSE_GUARD_SIGNER_THUMBPRINT=${p.signer_thumbprint}\nLG_INSTALL_ID_PATH=${p.install_id_path}\nLG_TOKEN_CACHE_PATH=${p.token_cache_path}\n` },
          go_config: { label: "Go Config", build: (p) => `cfg := licenseguard.Options{\n    Endpoint: "${p.endpoint}",\n    AppID: "${p.app_id}",\n    PublicKey: "${p.public_key}",\n    AppVersion: "${p.app_version}",\n    BinaryHash: "${p.binary_hash}",\n    SignerThumbprint: "${p.signer_thumbprint}",\n}\nclient, err := licenseguard.NewClient(cfg)\n` },
          startup: { label: "启动流程", build: () => `cached, err := client.VerifyLocalOnStartup()\nif err == nil && cached.Allowed {\n    enableBaseFeatures(cached.Entitlements)\n    go refreshLicenseOnline(context.Background(), client)\n} else {\n    showActivationOrRestrictedMode(err)\n}\n` },
          activate: { label: "Activate", build: (p) => demoCommand(p, "activate", true) },
          local: { label: "Local Verify", build: (p) => demoCommand(p, "local", false) },
          verify: { label: "Verify + Heartbeat", build: (p) => `${demoCommand(p, "verify", false)}\n\n${demoCommand(p, "heartbeat", false)}` },
          entitlements: { label: "Entitlements", build: () => `if !client.HasEntitlement(result, "export.enabled") {\n    return errors.New("当前授权不包含导出功能")\n}\nrunExportJob()\n` },
          errors: { label: "Errors", build: () => `"LICENSE_REVOKED": "授权已吊销，请联系管理员。",\n"LICENSE_SUSPENDED": "授权已暂停，请联系管理员恢复。",\n"DEVICE_BLOCKED": "当前设备已被封禁。",\n"DEVICE_LIMIT_EXCEEDED": "授权设备数已达上限，请解绑旧设备。",\n"INTEGRITY_FAILED": "应用完整性校验失败，请重新安装官方版本。",\n"TOKEN_EXPIRED": "授权状态需要联网刷新。",\n"APP_VERSION_BLOCKED": "当前版本已停用，请升级。",\n` },
        };
      }

      function demoCommand(p, mode, includeLicense) {
        const license = includeLicense && p.license_key ? ` -license "${p.license_key}"` : "";
        return `LG_INSTALL_ID_PATH="${p.install_id_path}" \\\nLG_TOKEN_CACHE_PATH="${p.token_cache_path}" \\\ngo run ./examples/windows-go-demo -endpoint "${p.endpoint}" -app-id "${p.app_id}"${license} -version "${p.app_version}" -binary-hash "${p.binary_hash}" -signer "${p.signer_thumbprint}" -public-key "${p.public_key}" -mode ${mode}`;
      }

      function renderSDKVerify(ctx) {
        if (!ctx) return;
        const p = ctx.params;
        const tamper = `${demoCommand({ ...p, binary_hash: "tampered-hash" }, "verify", false)}`;
        document.getElementById("sdkPanelVerify").innerHTML = `
          <div class="sdk-board">
            <div class="code-grid">
              <div class="code-box"><div class="code-head"><span>首次激活</span><button class="button secondary" data-copy-target="verifyActivateCommand"><i class="icon" data-lucide="copy"></i><span>复制</span></button></div><pre id="verifyActivateCommand">${escapeHTML(demoCommand(p, "activate", true))}</pre></div>
              <div class="code-box"><div class="code-head"><span>在线 verify + heartbeat</span><button class="button secondary" data-copy-target="verifyOnlineCommand"><i class="icon" data-lucide="copy"></i><span>复制</span></button></div><pre id="verifyOnlineCommand">${escapeHTML(`${demoCommand(p, "verify", false)}\n\n${demoCommand(p, "heartbeat", false)}`)}</pre></div>
              <div class="code-box"><div class="code-head"><span>篡改 hash 演练</span><button class="button secondary" data-copy-target="tamperCommand"><i class="icon" data-lucide="copy"></i><span>复制</span></button></div><pre id="tamperCommand">${escapeHTML(tamper)}</pre></div>
            </div>
            <div class="sdk-evidence">
              <h3>验收状态</h3>
              ${evidenceRows(withManualStepState(ctx.onboarding, ctx.appID))}
              <div class="sdk-actions">${actionButton("下载集成包", "download-bundle", ctx.appID)}</div>
            </div>
          </div>`;
      }

      function activeSDKKey(keys) {
        return [...keys].find((item) => item.status === "active") || keys[0] || null;
      }

      function manualStepIDs(appID) {
        try {
          return new Set(JSON.parse(localStorage.getItem(`lg_sdk_manual_${appID}`) || "[]"));
        } catch {
          return new Set();
        }
      }

      function withManualStepState(onboarding, appID) {
        const selected = manualStepIDs(appID);
        return { ...onboarding, steps: (onboarding.steps || []).map((step) => (step.source === "client" && selected.has(step.id) ? { ...step, status: "passed" } : step)) };
      }

      function toggleManualSDKStep(stepID) {
        if (!state.sdkContext) return;
        const key = `lg_sdk_manual_${state.sdkContext.appID}`;
        const selected = manualStepIDs(state.sdkContext.appID);
        if (selected.has(stepID)) selected.delete(stepID);
        else selected.add(stepID);
        localStorage.setItem(key, JSON.stringify([...selected]));
      }

      async function downloadIntegrationBundle(appID) {
        const headers = { "Content-Type": "application/json" };
        if (state.token) headers.Authorization = `Bearer ${state.token}`;
        const res = await fetch(`/admin/apps/${encodeURIComponent(appID)}/integration-bundle`, {
          method: "POST",
          headers,
          body: JSON.stringify({ endpoint: state.sdkContext?.params.endpoint || `${window.location.origin}/v1` }),
        });
        if (!res.ok) {
          document.getElementById("copyState").textContent = "集成包生成失败";
          return;
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `licenseguard-integration-${appID}.zip`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        document.getElementById("copyState").textContent = "集成包已生成";
      }

      function renderSDKKeyPanel(appID, sdkKey, keys) {
        const rotatedCount = keys.filter((item) => item.status === "rotated").length;
        const status = sdkKey ? `${badge(sdkKey.status, sdkKey.status === "active" ? "success" : "warning")} ${escapeHTML(sdkKey.key_prefix || "")}` : badge("未生成", "warning");
        const rotated = rotatedCount ? `<div class="muted-line">历史轮换 ${rotatedCount} 次</div>` : "";
        document.getElementById("sdkKeyPanel").innerHTML = `
          <div class="callout">
            <div class="strong">SDK Key</div>
            <div>${status}</div>
            ${rotated}
            <div class="muted-line">Secret 只在轮换后显示一次，服务端仅保存 hash。</div>
            ${actionButton("轮换", "rotate-sdk-key", appID)}
          </div>`;
        document.getElementById("sdkSecretState").innerHTML = state.sdkSecret ? `<div class="callout"><div class="strong">新 SDK Secret，只显示一次</div><div class="mono">${escapeHTML(state.sdkSecret)}</div></div>` : "";
      }

      function formatDate(value) {
        return value ? new Date(value).toLocaleDateString() : "";
      }

      function formatDateTime(value) {
        return value ? new Date(value).toLocaleString() : "";
      }

      function escapeHTML(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[char]);
      }

      document.addEventListener("click", async (event) => {
        const copyButton = event.target.closest("[data-copy-target]");
        if (!copyButton) return;
        const target = document.getElementById(copyButton.dataset.copyTarget);
        if (!target) return;
        try {
          await navigator.clipboard.writeText(target.textContent || "");
          document.getElementById("copyState").textContent = "已复制";
          setTimeout(() => {
            document.getElementById("copyState").textContent = "";
          }, 1600);
        } catch {
          document.getElementById("copyState").textContent = "复制失败，请手动选择文本";
        }
      });

      if (state.token) {
        showApp();
        loadAll()
          .then(restoreSectionFromHash)
          .catch(() => {
            localStorage.removeItem("lg_admin_token");
            showLogin();
          });
      }
    </script>
  </body>
</html>
